<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海小说人物聚类分析报告</title>
    <!-- 加载 React 和 Babel 用于渲染 JSX 内容 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #0f1117;
            font-family: 'Noto Sans SC', sans-serif;
            color: #e4e6ed;
        }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f1117; }
        ::-webkit-scrollbar-thumb { background: #2a2e3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f4454; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const COLORS = {
            bg: "#0f1117",
            card: "#1a1d27",
            cardHover: "#222633",
            border: "#2a2e3a",
            text: "#e4e6ed",
            textMuted: "#8b90a0",
            accent: "#6c8aff",
            accentSoft: "rgba(108,138,255,0.12)",
            green: "#4ade80",
            greenSoft: "rgba(74,222,128,0.12)",
            amber: "#fbbf24",
            amberSoft: "rgba(251,191,36,0.12)",
            rose: "#fb7185",
            roseSoft: "rgba(251,113,133,0.12)",
            purple: "#a78bfa",
            purpleSoft: "rgba(167,139,250,0.12)",
            cyan: "#22d3ee",
            cyanSoft: "rgba(34,211,238,0.12)",
        };

        const PERSONA_COLORS = [
            "#6c8aff", "#4ade80", "#fbbf24", "#fb7185",
            "#a78bfa", "#22d3ee", "#f97316", "#e879f9"
        ];

        const personaData = [
            {
                id: 0, name: "主角/核心人物", nameEn: "Protagonist",
                count: 1414, pct: "29.1%",
                male: 52.4, female: 40.0, neutral: 7.6,
                avgCount: 139, medCount: 33,
                desc: "小说中的主角或核心人物。出场频率最高（中位数33次），涵盖了大部分小说的第一主角。性别偏男性（52% vs 40%），是最大的聚类。",
                topChars: ["Juliette (These Violent Delights)", "Franz (Far Side of the Sky)", "Jim (Empire of the Sun)", "Chen (A Case of Two Cities)"],
                femaleInXlsx: 54,
                xlsxRoles: "会计、执法官、家庭主妇、餐厅员工等各类职业",
                quality: "good",
                qualityNote: "能稳定捕获各书中的核心人物，聚类效果好"
            },
            {
                id: 1, name: "传记式/成长型人物", nameEn: "Biographical",
                count: 601, pct: "12.4%",
                male: 54.3, female: 42.0, neutral: 3.7,
                avgCount: 94, medCount: 34,
                desc: "以传记或成长叙事为核心的角色。高度集中于特定书籍（如《画家来自上海》114人、《成为蒋夫人》100人），角色发展轨迹完整。",
                topChars: ["Yuliang (Painter From Shanghai)", "Mao (Becoming Madame Mao)", "May (Shanghai Girls)", "Gary (Five Star Billionaire)"],
                femaleInXlsx: 6,
                xlsxRoles: "家庭主妇、自由撰稿人、遗传学研究员、学生/艺术家",
                quality: "medium",
                qualityNote: "与Persona 0有一定重叠，区分依据可能是叙事结构而非角色类型"
            },
            {
                id: 2, name: "群体/匿名角色", nameEn: "Collective/Anonymous",
                count: 265, pct: "5.5%",
                male: 22.5, female: 9.4, neutral: 68.1,
                avgCount: 101, medCount: 24,
                desc: "以they/them代词为主（68%），大量'Character_X'和'others'。代表群体性、匿名化的角色——如人群、群众、旁白提及的群体。",
                topChars: ["Character_0 (Dreams of Joy)", "Character_0 (Shanghai Girls)", "people (Five Star Billionaire)", "Zhang Gutai (These Violent Delights)"],
                femaleInXlsx: 0,
                xlsxRoles: "—",
                quality: "good",
                qualityNote: "清晰地将群体性角色从个体角色中分离，聚类逻辑清晰"
            },
            {
                id: 3, name: "家庭关系型人物", nameEn: "Family/Relational",
                count: 910, pct: "18.7%",
                male: 53.2, female: 39.1, neutral: 7.8,
                avgCount: 91, medCount: 33,
                desc: "以家庭关系定义的角色：'my father'、'my mother'等。高度集中于Amy Tan等家庭叙事型作家的作品（《惊奇山谷》119人）。",
                topChars: ["my father (Distant Land)", "my mother (Distant Land)", "Lu Shing (Valley of Amazement)", "Magic Gourd (Valley of Amazement)"],
                femaleInXlsx: 27,
                xlsxRoles: "仆人、佣人、手工艺人、家庭主妇、社交名媛",
                quality: "good",
                qualityNote: "成功区分了以家庭/关系网络为中心的角色群体"
            },
            {
                id: 4, name: "第一人称叙述者", nameEn: "First-Person Narrator",
                count: 172, pct: "3.5%",
                male: 42.4, female: 39.6, neutral: 18.1,
                avgCount: 534, medCount: 25,
                desc: "最小但出场频次最极端的聚类（最高11695次）。几乎全部是'Character_0'——即未被命名解析的第一人称叙述者（'I'）。",
                topChars: ["Character_0 (Valley of Amazement: 11695)", "Character_0 (Peach Blossom: 7384)", "Character_0 (Distant Land: 6809)", "Character_0 (Shanghai Moon: 5716)"],
                femaleInXlsx: 1,
                xlsxRoles: "打字员/难民收容所职员",
                quality: "medium",
                qualityNote: "有效识别了叙述者，但与Persona 7（也含大量Character_0）有一定混淆"
            },
            {
                id: 5, name: "重要配角（中频）", nameEn: "Key Supporting",
                count: 469, pct: "9.6%",
                male: 43.1, female: 30.9, neutral: 26.0,
                avgCount: 51, medCount: 30,
                desc: "出场频率中等偏低、但有明确名字和身份的配角。均匀分布于各书，无极端集中。",
                topChars: ["Liu (Don't Cry Tai Lake)", "Guan (Death of a Red Heroine)", "Lena (Master of Rain)", "Pearl (Peach Blossom)"],
                femaleInXlsx: 7,
                xlsxRoles: "新闻主播、待嫁少女、劳动模范、厨师、家庭主妇",
                quality: "medium",
                qualityNote: "与Persona 0和6的边界较模糊，区分逻辑不够清晰"
            },
            {
                id: 6, name: "情节驱动型配角", nameEn: "Plot-Driven Supporting",
                count: 509, pct: "10.5%",
                male: 44.1, female: 35.9, neutral: 20.0,
                avgCount: 60, medCount: 30,
                desc: "中频出场的角色，倾向于出现在情节驱动型小说中（Five Star Billionaire、What We Were Promised等当代都市题材）。",
                topChars: ["Lindsey (Rabbit Moon)", "Wen (A Loyal Character Dancer)", "Jiao (The Mao Case)", "Yin (When Red Is Black)"],
                femaleInXlsx: 4,
                xlsxRoles: "工人/知青、白俄流亡者、伴游、文革受害者",
                quality: "weak",
                qualityNote: "与Persona 5高度相似，区分度不足"
            },
            {
                id: 7, name: "未解析角色/边缘人物", nameEn: "Unresolved/Peripheral",
                count: 520, pct: "10.7%",
                male: 30.8, female: 27.3, neutral: 41.9,
                avgCount: 60, medCount: 21,
                desc: "they/them占比最高的个体类聚类（42%），大量'Character_X'未被命名解析。中位出场仅21次，是最低频的聚类之一。",
                topChars: ["Character_0 (Shanghai Immortal: 6602)", "Character_0 (Master of Rain: 2277)", "Character_0 (Far Side of Sky: 1930)"],
                femaleInXlsx: 0,
                xlsxRoles: "—",
                quality: "weak",
                qualityNote: "与Persona 2和4在'未解析角色'上有重叠，聚类区分度不足"
            }
        ];

        const overallAssessment = {
            strengths: [
                "成功将第一人称叙述者（Persona 4）和群体角色（Persona 2）分离出来，这是有意义的结构区分",
                "主角聚类（Persona 0）稳定性好，能准确捕获各书核心人物",
                "家庭关系型角色（Persona 3）的聚类具有清晰的叙事学意义",
                "8个聚类的大小分布合理，没有极端碎片化"
            ],
            weaknesses: [
                "Persona 5和6几乎无法区分——出场频率、性别比、角色类型都高度相似，建议合并",
                "Persona 4和7都包含大量'Character_0'（未解析角色），边界模糊",
                "聚类特征更多反映'叙事技术特征'（如代词使用、出场频率）而非'角色类型'（如职业、阶层）",
                "64%的xlsx高频女性人物能匹配到CSV，但55个未匹配可能意味着命名解析有损失"
            ],
            suggestion: "建议尝试：(1) 将8类减至5-6类（合并5+6，合并4+7）看是否更清晰；(2) 如果研究目标是角色类型而非叙事功能，考虑引入角色属性（职业、阶层等）作为聚类特征"
        };

        function GenderBar({ male, female, neutral }) {
            return (
                <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", width: "100%" }}>
                    <div style={{ width: `${male}%`, background: "#6c8aff" }} title={`Male ${male}%`} />
                    <div style={{ width: `${female}%`, background: "#fb7185" }} title={`Female ${female}%`} />
                    <div style={{ width: `${neutral}%`, background: "#8b90a0" }} title={`Neutral ${neutral}%`} />
                </div>
            );
        }

        function QualityBadge({ quality }) {
            const config = {
                good: { label: "效果好", bg: COLORS.greenSoft, color: COLORS.green },
                medium: { label: "一般", bg: COLORS.amberSoft, color: COLORS.amber },
                weak: { label: "较弱", bg: COLORS.roseSoft, color: COLORS.rose },
            };
            const c = config[quality];
            return (
                <span style={{
                    padding: "2px 10px", borderRadius: 12, fontSize: 12,
                    background: c.bg, color: c.color, fontWeight: 600
                }}>{c.label}</span>
            );
        }

        function PersonaCard({ p, isExpanded, onClick }) {
            return (
                <div
                    onClick={onClick}
                    style={{
                        background: COLORS.card, border: `1px solid ${COLORS.border}`,
                        borderRadius: 12, padding: 20, cursor: "pointer",
                        borderLeft: `3px solid ${PERSONA_COLORS[p.id]}`,
                        transition: "all 0.2s",
                        marginBottom: 12
                    }}
                >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                        <div>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                                <span style={{
                                    background: PERSONA_COLORS[p.id], color: "#0f1117",
                                    width: 24, height: 24, borderRadius: 6, display: "inline-flex",
                                    alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700
                                }}>{p.id}</span>
                                <span style={{ color: COLORS.text, fontSize: 16, fontWeight: 600 }}>{p.name}</span>
                            </div>
                            <span style={{ color: COLORS.textMuted, fontSize: 13 }}>{p.nameEn}</span>
                        </div>
                        <div style={{ textAlign: "right" }}>
                            <div style={{ color: COLORS.text, fontSize: 20, fontWeight: 700 }}>{p.count}</div>
                            <div style={{ color: COLORS.textMuted, fontSize: 12 }}>{p.pct}</div>
                        </div>
                    </div>

                    <div style={{ marginBottom: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                            <span style={{ color: COLORS.textMuted, fontSize: 11 }}>性别分布</span>
                            <span style={{ color: COLORS.textMuted, fontSize: 11 }}>
                                <span style={{ color: "#6c8aff" }}>♂{p.male}%</span>
                                {" "}
                                <span style={{ color: "#fb7185" }}>♀{p.female}%</span>
                                {" "}
                                <span style={{ color: "#8b90a0" }}>⚪{p.neutral}%</span>
                            </span>
                        </div>
                        <GenderBar male={p.male} female={p.female} neutral={p.neutral} />
                    </div>

                    <div style={{ display: "flex", gap: 16, marginBottom: 12, fontSize: 12 }}>
                        <div>
                            <span style={{ color: COLORS.textMuted }}>均值频次 </span>
                            <span style={{ color: COLORS.text, fontWeight: 600 }}>{p.avgCount}</span>
                        </div>
                        <div>
                            <span style={{ color: COLORS.textMuted }}>中位频次 </span>
                            <span style={{ color: COLORS.text, fontWeight: 600 }}>{p.medCount}</span>
                        </div>
                        <div>
                            <span style={{ color: COLORS.textMuted }}>xlsx匹配 </span>
                            <span style={{ color: COLORS.text, fontWeight: 600 }}>{p.femaleInXlsx}</span>
                        </div>
                    </div>

                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                        <span style={{ color: COLORS.textMuted, fontSize: 12 }}>聚类质量</span>
                        <QualityBadge quality={p.quality} />
                    </div>

                    <p style={{ color: COLORS.textMuted, fontSize: 13, lineHeight: 1.6, margin: "8px 0 0" }}>
                        {p.desc}
                    </p>

                    {isExpanded && (
                        <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${COLORS.border}` }}>
                            <div style={{ marginBottom: 12 }}>
                                <div style={{ color: COLORS.accent, fontSize: 12, fontWeight: 600, marginBottom: 6 }}>代表性人物</div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                                    {p.topChars.map((c, i) => (
                                        <span key={i} style={{
                                            background: COLORS.accentSoft, color: COLORS.accent,
                                            padding: "3px 10px", borderRadius: 6, fontSize: 12
                                        }}>{c}</span>
                                    ))}
                                </div>
                            </div>
                            {p.xlsxRoles !== "—" && (
                                <div style={{ marginBottom: 8 }}>
                                    <div style={{ color: COLORS.rose, fontSize: 12, fontWeight: 600, marginBottom: 4 }}>xlsx女性角色职业</div>
                                    <p style={{ color: COLORS.textMuted, fontSize: 12, margin: 0 }}>{p.xlsxRoles}</p>
                                </div>
                            )}
                            <div style={{ marginTop: 8 }}>
                                <div style={{ color: COLORS.amber, fontSize: 12, fontWeight: 600, marginBottom: 4 }}>评估</div>
                                <p style={{ color: COLORS.textMuted, fontSize: 12, margin: 0 }}>{p.qualityNote}</p>
                            </div>
                        </div>
                    )}

                    <div style={{ textAlign: "center", marginTop: 8 }}>
                        <span style={{ color: COLORS.textMuted, fontSize: 11 }}>{isExpanded ? "▲ 收起" : "▼ 点击展开详情"}</span>
                    </div>
                </div>
            );
        }

        function ClusteringAnalysis() {
            const [expanded, setExpanded] = useState(null);
            const [tab, setTab] = useState("overview");

            return (
                <div style={{
                    background: COLORS.bg, color: COLORS.text, minHeight: "100vh",
                    padding: "32px 24px",
                }}>
                    <div style={{ maxWidth: 900, margin: "0 auto" }}>
                        {/* Header */}
                        <div style={{ marginBottom: 32 }}>
                            <h1 style={{ fontSize: 28, fontWeight: 700, margin: "0 0 8px", color: COLORS.text, letterSpacing: -0.5 }}>
                                上海小说人物聚类分析报告
                            </h1>
                            <p style={{ color: COLORS.textMuted, fontSize: 14, margin: 0, lineHeight: 1.6 }}>
                                42部小说 · 4,860个角色 · 8个Persona聚类 · SAGE算法
                            </p>
                        </div>

                        {/* Summary Stats */}
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 28 }}>
                            {[
                                { label: "总角色数", value: "4,860", sub: "32位作者" },
                                { label: "聚类数", value: "8", sub: "Persona 0-7" },
                                { label: "女性角色", value: "1,618", sub: "33.3%" },
                                { label: "xlsx匹配率", value: "64.3%", sub: "99/154" },
                            ].map((s, i) => (
                                <div key={i} style={{
                                    background: COLORS.card, border: `1px solid ${COLORS.border}`,
                                    borderRadius: 10, padding: "16px 14px", textAlign: "center"
                                }}>
                                    <div style={{ color: COLORS.text, fontSize: 22, fontWeight: 700 }}>{s.value}</div>
                                    <div style={{ color: COLORS.textMuted, fontSize: 12, marginTop: 2 }}>{s.label}</div>
                                    <div style={{ color: COLORS.textMuted, fontSize: 11, marginTop: 2 }}>{s.sub}</div>
                                </div>
                            ))}
                        </div>

                        {/* Tabs */}
                        <div style={{ display: "flex", gap: 4, marginBottom: 24 }}>
                            {[
                                { key: "overview", label: "聚类总览" },
                                { key: "quality", label: "效果评估" },
                            ].map(t => (
                                <button key={t.key} onClick={() => setTab(t.key)} style={{
                                    padding: "8px 20px", borderRadius: 8, border: "none", cursor: "pointer",
                                    background: tab === t.key ? COLORS.accent : COLORS.card,
                                    color: tab === t.key ? "#fff" : COLORS.textMuted,
                                    fontSize: 14, fontWeight: 600, transition: "all 0.2s"
                                }}>{t.label}</button>
                            ))}
                        </div>

                        {tab === "overview" && (
                            <>
                                {/* Size distribution bar */}
                                <div style={{
                                    background: COLORS.card, border: `1px solid ${COLORS.border}`,
                                    borderRadius: 12, padding: 20, marginBottom: 20
                                }}>
                                    <div style={{ color: COLORS.textMuted, fontSize: 12, marginBottom: 12, fontWeight: 600 }}>聚类大小分布</div>
                                    <div style={{ display: "flex", height: 28, borderRadius: 6, overflow: "hidden" }}>
                                        {personaData.map(p => (
                                            <div
                                                key={p.id}
                                                style={{
                                                    width: `${(p.count / 4860) * 100}%`,
                                                    background: PERSONA_COLORS[p.id],
                                                    display: "flex", alignItems: "center", justifyContent: "center",
                                                    fontSize: 11, fontWeight: 700, color: "#0f1117",
                                                    transition: "all 0.2s",
                                                }}
                                                title={`Persona ${p.id}: ${p.count} (${p.pct})`}
                                            >
                                                {p.count > 300 ? p.id : ""}
                                            </div>
                                        ))}
                                    </div>
                                    <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginTop: 10 }}>
                                        {personaData.map(p => (
                                            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: COLORS.textMuted }}>
                                                <span style={{ width: 8, height: 8, borderRadius: 2, background: PERSONA_COLORS[p.id], display: "inline-block" }} />
                                                P{p.id}: {p.count}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Persona Cards */}
                                <div style={{ display: "grid", gap: 12 }}>
                                    {personaData.map(p => (
                                        <PersonaCard
                                            key={p.id} p={p}
                                            isExpanded={expanded === p.id}
                                            onClick={() => setExpanded(expanded === p.id ? null : p.id)}
                                        />
                                    ))}
                                </div>
                            </>
                        )}

                        {tab === "quality" && (
                            <div style={{ display: "grid", gap: 16 }}>
                                {/* Overall Score */}
                                <div style={{
                                    background: COLORS.card, border: `1px solid ${COLORS.border}`,
                                    borderRadius: 12, padding: 24, textAlign: "center"
                                }}>
                                    <div style={{ fontSize: 48, fontWeight: 700, color: COLORS.amber, marginBottom: 4 }}>B</div>
                                    <div style={{ color: COLORS.textMuted, fontSize: 14 }}>整体聚类效果评级</div>
                                    <p style={{ color: COLORS.textMuted, fontSize: 13, maxWidth: 600, margin: "12px auto 0", lineHeight: 1.7 }}>
                                        聚类在叙事结构层面（主角/配角/叙述者/群体）表现良好，但在角色类型学（character typology）层面区分力不足。部分聚类之间边界模糊，建议优化。
                                    </p>
                                </div>

                                {/* Per-cluster quality */}
                                <div style={{
                                    background: COLORS.card, border: `1px solid ${COLORS.border}`,
                                    borderRadius: 12, padding: 20
                                }}>
                                    <div style={{ color: COLORS.text, fontSize: 15, fontWeight: 600, marginBottom: 16 }}>各聚类质量一览</div>
                                    {personaData.map(p => (
                                        <div key={p.id} style={{
                                            display: "flex", alignItems: "center", gap: 12, padding: "10px 0",
                                            borderBottom: p.id < 7 ? `1px solid ${COLORS.border}` : "none"
                                        }}>
                                            <span style={{
                                                background: PERSONA_COLORS[p.id], color: "#0f1117",
                                                width: 22, height: 22, borderRadius: 5, display: "inline-flex",
                                                alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0
                                            }}>{p.id}</span>
                                            <span style={{ color: COLORS.text, fontSize: 13, fontWeight: 500, width: 160, flexShrink: 0 }}>{p.name}</span>
                                            <QualityBadge quality={p.quality} />
                                            <span style={{ color: COLORS.textMuted, fontSize: 12, marginLeft: 8 }}>{p.qualityNote}</span>
                                        </div>
                                    ))}
                                </div>

                                {/* Strengths */}
                                <div style={{
                                    background: COLORS.card, border: `1px solid ${COLORS.border}`,
                                    borderRadius: 12, padding: 20
                                }}>
                                    <div style={{ color: COLORS.green, fontSize: 15, fontWeight: 600, marginBottom: 12 }}>优势</div>
                                    {overallAssessment.strengths.map((s, i) => (
                                        <div key={i} style={{
                                            display: "flex", gap:10, padding: "8px 0",
                                            borderBottom: i < overallAssessment.strengths.length - 1 ? `1px solid ${COLORS.border}` : "none"
                                        }}>
                                            <span style={{ color: COLORS.green, fontSize: 14, flexShrink: 0 }}>✓</span>
                                            <span style={{ color: COLORS.textMuted, fontSize: 13, lineHeight: 1.6 }}>{s}</span>
                                        </div>
                                    ))}
                                </div>

                                {/* Weaknesses */}
                                <div style={{
                                    background: COLORS.card, border: `1px solid ${COLORS.border}`,
                                    borderRadius: 12, padding: 20
                                }}>
                                    <div style={{ color: COLORS.rose, fontSize: 15, fontWeight: 600, marginBottom: 12 }}>不足</div>
                                    {overallAssessment.weaknesses.map((s, i) => (
                                        <div key={i} style={{
                                            display: "flex", gap: 10, padding: "8px 0",
                                            borderBottom: i < overallAssessment.weaknesses.length - 1 ? `1px solid ${COLORS.border}` : "none"
                                        }}>
                                            <span style={{ color: COLORS.rose, fontSize: 14, flexShrink: 0 }}>✗</span>
                                            <span style={{ color: COLORS.textMuted, fontSize: 13, lineHeight: 1.6 }}>{s}</span>
                                        </div>
                                    ))}
                                </div>

                                {/* Suggestion */}
                                <div style={{
                                    background: COLORS.accentSoft, border: `1px solid ${COLORS.accent}33`,
                                    borderRadius: 12, padding: 20
                                }}>
                                    <div style={{ color: COLORS.accent, fontSize: 15, fontWeight: 600, marginBottom: 8 }}>优化建议</div>
                                    <p style={{ color: COLORS.textMuted, fontSize: 13, lineHeight: 1.7, margin: 0 }}>
                                        {overallAssessment.suggestion}
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClusteringAnalysis />);
    </script>
</body>
</html>
